name: 🔔 Notifications Débat Quotidien

on:
  schedule:
    # 8h00 UTC = 9h00 Paris (hiver) / 10h00 Paris (été)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (ne pas envoyer réellement)'
        required: false
        default: 'false'

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer web-push
        run: npm install web-push

      - name: Envoyer les notifications
        run: node scripts/send-notifications.js
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          FIREBASE_DATABASE_SECRET: ${{ secrets.FIREBASE_DATABASE_SECRET }}
