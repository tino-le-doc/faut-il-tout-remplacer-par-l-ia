name: 🚀 Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TINO_LE_DOC_COM }}
          channelId: live
          projectId: tino-le-doc

      - name: Deploy Database Rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TINO_LE_DOC_COM }}' > /tmp/sa.json
          npx firebase-tools deploy --only database --project tino-le-doc
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
